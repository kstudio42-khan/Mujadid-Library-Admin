<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <h1>Admin Panel</h1>
            <button class="btn" onclick="logout()">Logout</button>
        </header>
        <div class="layout">
            <aside class="sidebar">
                <ul>
                    <li>Dashboard</li>
                    <li>Books</li>
                </ul>
            </aside>
            <main class="content">
                <h2>Welcome, Admin</h2>
            </main>
        </div>
    </div>
    
    <!-- Book Modal -->
    <div id="bookModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div style="background:white; padding:2rem; border-radius:8px; width:400px;">
            <h2 id="modalTitle">Add Book</h2>
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="bookTitle" required>
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="bookAuthor" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="bookCategory" required>
                </div>
                <div class="form-group">
                    <label>Cover Image</label>
                    <input type="file" id="bookCover" accept="image/*">
                </div>
                <div class="form-group">
                    <label>PDF File</label>
                    <input type="file" id="bookPdf" accept="application/pdf">
                </div>
                <button type="submit" class="btn">Save</button>
                <button type="button" class="btn" style="background:#6c757d;" onclick="closeModal()">Cancel</button>
            </form>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="books.js"></script>
    <script>
        window.onload = async () => {
            await checkAuth(true);
            await fetchBooks();
        };
    </script>
</body>
</html>
